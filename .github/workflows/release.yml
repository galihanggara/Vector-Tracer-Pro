name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"   # matches v1.0.0, v1.0.0-rc.1, etc.

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Verify the tag is on main branch
  # ---------------------------------------------------------------------------
  verify:
    name: Verify Release Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag is on main
        run: |
          git branch -r --contains ${{ github.ref }} | grep -q "origin/main" \
            || (echo "Tag must be on main branch" && exit 1)

  # ---------------------------------------------------------------------------
  # Build Windows Installer
  # ---------------------------------------------------------------------------
  build-installer:
    name: Build Windows Installer
    runs-on: [self-hosted, windows, potrace, inkscape]
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" pyinstaller

      - name: Verify external dependencies
        run: .\scripts\check_deps.ps1

      - name: Run full test suite
        run: pytest -m "unit or integration" -v

      - name: Build with PyInstaller
        run: .\scripts\build.ps1

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: packaging/pyinstaller/dist/*.exe
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-installer
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Extract changelog entry
        id: changelog
        run: |
          python scripts/extract_changelog.py ${{ github.ref_name }} >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Vector Tracer Pro ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.exe
            dist/SHA256SUMS.txt
