name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint & Type Check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff (lint)
        run: ruff check src tests

      - name: Run ruff (format check)
        run: ruff format --check src tests

      - name: Run mypy
        run: mypy src

  # ---------------------------------------------------------------------------
  # Unit Tests (no external binaries required)
  # ---------------------------------------------------------------------------
  test-unit:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -m unit --cov=src/vector_tracer_pro --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: unit
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Integration Tests (requires Potrace + Inkscape — self-hosted runner)
  # ---------------------------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: [self-hosted, windows, potrace, inkscape]
    needs: test-unit
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Verify external dependencies
        run: .\scripts\check_deps.ps1

      - name: Run integration tests
        run: pytest -m integration -v
